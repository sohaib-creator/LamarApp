    branch: main
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: gateway01.eu-central-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: 4000
      - key: DB_USER
        value: 2bK5HBexjUuaa4o.root
      - key: DB_PASSWORD
        value: x9fK9pLFTLAPCcT7
      - key: DB_NAME
        value: lamar_app_db
      - key: DB_SSL
        value: 'true'
      - key: JWT_SECRET
        value: lamar_2024_super_secret_key_change_in_production
